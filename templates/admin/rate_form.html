{% extends "base.html" %}
{% block title %}New rate card{% endblock %}
{% block content %}
<h1 class="pc-page-h1">New rate card</h1>
<form method="post" class="pc-card" style="max-width:720px;">
  <div class="pc-form-row">
    <div><label>Agency *</label>
      <select name="agency_id" required>
        {% for a in agencies %}<option value="{{ a.id }}">{{ a.name }}</option>{% endfor %}
      </select>
    </div>
    <div><label>Project *</label>
      <select name="project_id" required>
        {% for p in projects %}<option value="{{ p.id }}">{{ p.name }}</option>{% endfor %}
      </select>
    </div>
    <div><label>Skill *</label>
      <select name="skill_id" required>
        {% for s in skills %}<option value="{{ s.id }}">{{ s.name }}</option>{% endfor %}
      </select>
    </div>
  </div>
  <div class="pc-form-row">
    <div><label>Daily rate (₹) *</label><input type="number" step="0.01" name="daily_rate" required></div>
    <div><label>OT hourly rate (₹)</label><input type="number" step="0.01" name="ot_hourly_rate" value="0"></div>
    <div><label>Effective from *</label><input type="date" name="effective_from" required></div>
    <div><label>Effective to</label><input type="date" name="effective_to"></div>
  </div>
  <button class="pc-btn pc-btn-primary" type="submit">Save</button>
  <a class="pc-btn pc-btn-ghost" href="{{ url_for('admin.rates') }}">Cancel</a>
</form>
{% endblock %}
