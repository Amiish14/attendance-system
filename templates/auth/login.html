<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in · {{ APP_NAME }}</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body class="pc-login-bg">
  <div class="pc-login-card">
    <div style="text-align:center; margin-bottom:14px;">
      <img src="{{ url_for('static', filename='img/procam_logo.jpg') }}" alt="Procam" style="height:48px;">
    </div>
    <h1>{{ APP_NAME }}</h1>
    <div class="sub">{{ APP_TAGLINE }}</div>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="pc-flash {{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    <form method="post">
      <div class="pc-login-row">
        <label>Username</label>
        <input type="text" name="username" autocomplete="username" required autofocus>
      </div>
      <div class="pc-login-row">
        <label>Password</label>
        <input type="password" name="password" autocomplete="current-password" required>
      </div>
      <button class="pc-login-btn" type="submit">Sign in</button>
    </form>
    <div style="margin-top:18px; padding-top:14px; border-top:1px solid #f0f0f2;
                text-align:center; font-size:11px; color:#888;">
      Procam Logistics · Manpower attendance & billing
    </div>
  </div>
</body>
</html>
