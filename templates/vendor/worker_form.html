{% extends "base.html" %}
{% block title %}Add worker{% endblock %}
{% block content %}
<h1 class="pc-page-h1">Add worker</h1>
<form method="post" class="pc-card">
  <div class="pc-form-row">
    <div><label>Worker code *</label><input name="code" required></div>
    <div><label>Full name *</label><input name="full_name" required></div>
    <div><label>Skill</label>
      <select name="skill_id"><option value="">—</option>
        {% for s in skills %}<option value="{{ s.id }}">{{ s.name }}</option>{% endfor %}
      </select>
    </div>
  </div>
  <div class="pc-form-row">
    <div><label>Gender</label>
      <select name="gender"><option value="">—</option><option>Male</option><option>Female</option><option>Other</option></select>
    </div>
    <div><label>Mobile</label><input name="mobile"></div>
    <div><label>Aadhaar</label><input name="aadhaar" maxlength="12"></div>
  </div>
  <div class="pc-form-row">
    <div><label>Bank name</label><input name="bank_name"></div>
    <div><label>Account no.</label><input name="account_no"></div>
    <div><label>IFSC</label><input name="ifsc"></div>
  </div>
  <h3>Optional login</h3>
  <div class="pc-form-row">
    <label><input type="checkbox" name="create_login"> Create worker login</label>
  </div>
  <div class="pc-form-row">
    <div><label>Username</label><input name="username" placeholder="defaults to worker code"></div>
    <div><label>Password</label><input name="password" placeholder="defaults to worker code"></div>
  </div>
  <button class="pc-btn pc-btn-primary" type="submit">Save</button>
  <a class="pc-btn pc-btn-ghost" href="{{ url_for('vendor.workers') }}">Cancel</a>
</form>
{% endblock %}
